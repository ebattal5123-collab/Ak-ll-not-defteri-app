services:
  - type: web
    name: akilli-not-defteri
    runtime: python
    repo: https://github.com/kullaniciadi/akilli-not-defteri
    plan: free
    region: frankfurt
    branch: main
    buildCommand: |
      echo "Python sürümü kontrol ediliyor..."
      python --version
      pip install --upgrade pip
      pip install wheel
      pip install -r requirements.txt
    startCommand: gunicorn main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DB_URL
        sync: false
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: 0
      - key: RENDER
        value: true
    healthCheckPath: /
    autoDeploy: true
    buildFilter:
      paths:
      - main.py
      - requirements.txt
      - runtime.txt
      - render.yaml
