services:
  - type: web
    name: akilli-not-defteri
    runtime: python
    repo: https://github.com/kullaniciadi/akilli-not-defteri  # Kendi repo adresinizle değiştirin
    plan: free
    region: frankfurt  # veya singapore, ohio, oregon, frankfurt
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true  # Rastgele secret key oluşturur
      - key: DB_URL
        sync: false  # Elle girilecek (Neon DB bağlantısı)
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: 0
    healthCheckPath: /
    autoDeploy: true
